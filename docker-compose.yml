services:
  mail-hub:
    build: .
    image: baiqigo-mail-hub:local
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - API_SECRET=${API_SECRET}
      - PORT=3100
      - HOST=0.0.0.0
      - DB_PATH=/app/data/mail.db
      - PROXY_URL=${PROXY_URL:-}
    restart: unless-stopped
